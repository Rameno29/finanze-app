name: Keep-alive Supabase

# Il piano gratuito di Supabase mette in pausa i progetti dopo ~1 settimana
# senza richieste. Questo ping ogni 3 giorni lo tiene attivo.
on:
  schedule:
    - cron: '23 5 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://boucbthrnddmnzcowafy.supabase.co/rest/v1/categories?select=id&limit=1" \
            -H "apikey: sb_publishable_dKViNdk1yNGARxVb3KydBg_FPd0GCRb")
          echo "Risposta Supabase: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Il ping ha restituito $STATUS: controllare il progetto Supabase"
          fi
